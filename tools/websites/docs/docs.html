<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs — P3 Dual</title>
    <link rel="icon" type="image/x-icon" href="/icon.bmp">
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/docs/docs.css">
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a class="brand" href="/">
                <span class="p3">P3</span>
                <span class="dual">DUAL</span>
            </a>

            <div class="nav-right">
                <a class="nav-link" href="/">Tools</a>
                <a class="nav-link active" href="/docs/">Docs</a>

                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme"
                    title="Toggle dark/light mode">
                    <svg id="icon-sun" style="display:none" fill="none" stroke="currentColor" stroke-width="1.75"
                        viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4" />
                        <path
                            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                    </svg>
                    <svg id="icon-moon" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Skeleton shown while JS loads content -->
    <main id="app">
        <div class="doc-loading">
            <div class="loading-bar"></div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <span>P3 Dual - NDS Demake</span>
            <a href="https://github.com/TheBossT910/persona-3-dual" target="_blank" rel="noopener">GitHub</a>
        </div>
    </footer>

    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <!-- Shared theme toggle from root -->
    <script src="/index.js"></script>
    <!-- Docs logic -->
    <script src="/docs/docs.js"></script>

</body>

</html>
