<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS Map Editor</title>
  <link rel="icon" type="image/x-icon" href="/icon.bmp">

  <!-- Redirect to the actual site location.
       GitHub Pages serves this root index.html, then immediately forwards
       the browser to the tools subfolder where the real site lives. -->
  <meta http-equiv="refresh" content="0; url=/tools/websites/map-editor/map-editor.html">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0f;
      --panel:  #14141a;
      --border: #252530;
      --text:   #c0c0d0;
      --dim:    #555566;
      --accent: #f0a030;
      --font:   'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    p {
      color: var(--dim);
      font-size: 11px;
      line-height: 1.8;
      letter-spacing: 0.03em;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }

    a:hover {
      border-bottom-color: var(--accent);
    }

    .path {
      display: inline-block;
      margin-top: 14px;
      font-size: 10px;
      color: var(--dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 8px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">▸ DS Map Editor</div>
    <div class="spinner"></div>
    <p>
      Redirecting&hellip;<br><br>
      If you are not redirected automatically,<br>
      <a href="/tools/websites/map-editor/map-editor.html">DS Maps Tool</a>.
    </p>
    <div class="path">/tools/websites/map-editor/map-editor.html</div>
  </div>

  <script>
    // Instant JS redirect - fires before the meta refresh resolves.
    window.location.replace('/tools/websites/map-editor/map-editor.html');
  </script>

</body>
</html>
