name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - source/**

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    # it is still in public beta, but has a more updated doxygen
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Doxygen & Graphviz
        run: |
          sudo apt update
          sudo apt install -y doxygen graphviz

      - name: Generate docs
        run: doxygen

      - name: Set up Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/doxygen/html

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
