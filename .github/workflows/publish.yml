name: Publish Builder Image

on:
  push:
    branches: [ "main", "master" ]
    # Only run this workflow when the Docker-related files are modified
    paths:
      - 'Dockerfile'
      - '.dockerignore'
  # Allows you to manually click a button to build the image anytime
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Converts "p3d-project/persona-3-dual" to lowercase automatically
  IMAGE_NAME: ${{ github.repository }}/p3d-builder

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # CRITICAL: This grants the workflow permission to upload to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # This token is automatically provided by GitHub
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
