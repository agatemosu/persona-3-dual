name: Build ROM

on:
  push:
    branches: [main, master]
    paths-ignore: ['tools/**', 'docs/**', 'unistore/**', 'Dockerfile', '.dockerignore', '*.md', '**.md']
  pull_request:
    branches: [main, master]
    paths-ignore: ['tools/**', 'docs/**', 'unistore/**', 'Dockerfile', '.dockerignore', '*.md', '**.md']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  # 1. Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  # 2. Containerized build
  build:
    needs: lint
    runs-on: ubuntu-latest

    # Run all steps directly inside custom compiler environment
    container:
      image: ghcr.io/${{ github.repository }}/p3d-builder:latest

    # Force ccache to write inside the mounted workspace directory
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # Restored via cache below

      # --- 1. Lfs cache ---
      - name: Generate LFS cache key
        id: lfs-key
        run: |
          LFS_HASH=$(git lfs ls-files -l | cut -d' ' -f1 | sort | sha256sum | cut -d' ' -f1)
          echo "hash=${LFS_HASH}" >> $GITHUB_OUTPUT

      - name: Cache Git LFS objects
        id: cache-lfs
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ steps.lfs-key.outputs.hash }}
          restore-keys: lfs-${{ runner.os }}-

      - name: Pull LFS files (cache miss)
        if: steps.cache-lfs.outputs.cache-hit != 'true'
        run: git lfs pull

      - name: Checkout LFS files from cache (cache hit)
        if: steps.cache-lfs.outputs.cache-hit == 'true'
        run: git lfs checkout

      # --- 2. ccache integration ---
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: ${{ runner.os }}-ccache-nds
          max-size: '500M'
          # This action automatically respects the CCACHE_DIR environment variable set above

      # --- 3. Build & compile ---
      - name: Generate version tag
        id: version
        if: github.event_name != 'pull_request'
        run: |
          YEAR=$(date -u +%y)
          WEEK=$(date -u +%V)
          PREFIX="${YEAR}w${WEEK}"
          EXISTING=$(git tag --list "${PREFIX}*" | sort | tail -n1)

          if [ -z "$EXISTING" ]; then
            SUFFIX="a"
          else
            LAST_SUFFIX="${EXISTING#${PREFIX}}"
            SUFFIX=$(python3 tools/github-workflows/next_suffix.py "$LAST_SUFFIX")
          fi

          TAG="${PREFIX}${SUFFIX}"
          echo "${TAG}" > build-version.txt
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=Autobuild: ${TAG}" >> $GITHUB_OUTPUT

      - name: Upload version artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: build-version.txt
          retention-days: 1

      - name: Compile ROM
        run: |
          export CC="ccache arm-none-eabi-gcc"
          export CXX="ccache arm-none-eabi-g++"
          make

      - name: Compress and Package Assets
        run: |
          gzip -1 sdcard.img
          zip -r data.zip data/

      # --- 4. Validate and publish ---
      - name: Validate Output
        run: |
          if [ ! -f persona-3-dual.nds ]; then exit 1; fi
          LOGO_CRC=$(od -An -tx2 -j 0x15C -N 2 "persona-3-dual.nds" | tr -d ' \n')
          if [ "${LOGO_CRC,,}" != "cf56" ]; then exit 1; fi

      - name: Draft Release Notes
        if: github.event_name != 'pull_request'
        id: draft-release
        uses: release-drafter/release-drafter@v6
        with:
          commitish: ${{ github.sha }}
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          prerelease: true
          disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Binary Assets
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: true
          files: |
            persona-3-dual.nds
            sdcard.img.gz
            data.zip
