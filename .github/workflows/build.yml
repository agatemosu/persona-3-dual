name: Build ROM

on:
  push:
    branches: [main, master]
    paths-ignore: ['tools/**', 'docs/**', 'unistore/**', 'Dockerfile', '.dockerignore', '*.md', '**.md']
  pull_request:
    branches: [main, master]
    paths-ignore: ['tools/**', 'docs/**', 'unistore/**', 'Dockerfile', '.dockerignore', '*.md', '**.md']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  # 1. Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  # 2. Containerized build
  build:
    needs: lint
    runs-on: ubuntu-latest

    # Run all steps directly inside custom compiler environment.
    container:
      image: ghcr.io/${{ github.repository }}/p3d-builder:latest

    # CCACHE_DIR: explicit path so ccache writes inside the mounted workspace
    # and actions/cache can find it at a stable absolute location.
    # GIT_DIR: explicit path so git commands work correctly inside the container
    # regardless of which directory a step happens to execute from.
    # HOME: pin to /root so the venv at /root/.venv (baked into the image) is
    # found correctly; GitHub Actions containers default HOME to /github/home.
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GIT_DIR: ${{ github.workspace }}/.git
      HOME: /root

    # Ensure every run step executes from the repo root where .git lives.
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # Restored via cache below

      # --- 1. LFS cache ---
      # Generate a stable hash of all LFS pointers so the cache key changes
      # only when LFS files themselves change, not on every commit.
      - name: Generate LFS cache key
        id: lfs-key
        run: |
          LFS_HASH=$(git lfs ls-files -l | cut -d' ' -f1 | sort | sha256sum | cut -d' ' -f1)
          echo "hash=${LFS_HASH}" >> $GITHUB_OUTPUT

      - name: Cache Git LFS objects
        id: cache-lfs
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.git/lfs
          key: lfs-${{ runner.os }}-${{ steps.lfs-key.outputs.hash }}
          restore-keys: lfs-${{ runner.os }}-

      # On cache miss: fetch from LFS server and prune stale objects before
      # the post-action saves the cache, so it doesn't grow unboundedly.
      - name: Pull LFS files (cache miss)
        if: steps.cache-lfs.outputs.cache-hit != 'true'
        run: |
          git lfs pull
          git lfs prune

      # On cache hit: hydrate the working tree from the local .git/lfs store.
      # No network call needed.
      - name: Checkout LFS files from cache (cache hit)
        if: steps.cache-lfs.outputs.cache-hit == 'true'
        run: git lfs checkout

      # --- 2. ccache ---
      # ccache is pre-installed in the Docker image. We manage the cache
      # manually via actions/cache rather than using ccache-action, which
      # unconditionally tries to apt-install ccache and fails in containers
      # where apt lists have been cleaned.
      #
      # Cache key includes github.sha so each commit gets a fresh save slot,
      # while restore-keys falls back to the most recent prior build so
      # unchanged translation units are still cache hits.
      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z  # Zero stats so per-run hit rate is visible in the log

      # --- 3. Build & compile ---
      - name: Generate version tag
        id: version
        if: github.event_name != 'pull_request'
        run: |
          YEAR=$(date -u +%y)
          WEEK=$(date -u +%V)
          PREFIX="${YEAR}w${WEEK}"
          EXISTING=$(git tag --list "${PREFIX}*" | sort | tail -n1)

          if [ -z "$EXISTING" ]; then
            SUFFIX="a"
          else
            LAST_SUFFIX="${EXISTING#${PREFIX}}"
            SUFFIX=$(python3 tools/github-workflows/next_suffix.py "$LAST_SUFFIX")
          fi

          TAG="${PREFIX}${SUFFIX}"
          echo "${TAG}" > build-version.txt
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=Autobuild: ${TAG}" >> $GITHUB_OUTPUT

      - name: Upload version artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: ${{ github.workspace }}/build-version.txt
          retention-days: 1

      # Print hit/miss stats after the build so cache effectiveness is visible
      # in the Actions log without having to dig into ccache internals.
      - name: Compile ROM
        run: |
          export CC="ccache arm-none-eabi-gcc"
          export CXX="ccache arm-none-eabi-g++"
          make
          ccache -s

      - name: Compress and Package Assets
        run: |
          zip sdcard.img.zip sdcard.img
          zip -r data.zip data/

      # --- 4. Validate and publish ---
      - name: Validate Output
        run: |
          if [ ! -f persona-3-dual.nds ]; then exit 1; fi
          LOGO_CRC=$(od -An -tx2 -j 0x15C -N 2 "persona-3-dual.nds" | tr -d ' \n' | tr '[:upper:]' '[:lower:]')
          if [ "$LOGO_CRC" != "cf56" ]; then exit 1; fi

      # Release notes written to a file so multi-line strings with special
      # characters are passed safely without any YAML quoting concerns.
      # The new tag has not been pushed yet so the most recent existing tag
      # is the correct baseline for "what changed since last release".
      - name: Write release notes
        if: github.event_name != 'pull_request'
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n1)

          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty="- %s (%h)" | head -30)
            SINCE_MSG=""
          else
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty="- %s (%h)")
            SINCE_MSG=" since \`${PREV_TAG}\`"
          fi

          [ -z "$CHANGES" ] && CHANGES="- No new commits since last build"

          {
            echo "Automated build from commit \`${{ github.sha }}\` on \`${{ github.ref_name }}\`"
            echo ""
            echo "## Changes${SINCE_MSG}"
            echo "${CHANGES}"
            echo ""
            echo "## Assets"
            echo "| File | Use for |"
            echo "|------|---------|"
            echo "| \`persona-3-dual.nds\` | ROM - required for both emulator and hardware |"
            echo "| \`sdcard.img.zip\` | melonDS emulator - decompress & mount via DLDI settings |"
            echo "| \`data.zip\` | Real hardware - extract and place \`data/\` next to the ROM on your SD card |"
            echo ""
            echo "## Checksums"
            echo "| Algorithm | Hash |"
            echo "|-----------|------|"
            echo "| SHA-256   | \`$(sha256sum persona-3-dual.nds | cut -d' ' -f1)\` |"
            echo "| MD5       | \`$(md5sum persona-3-dual.nds | cut -d' ' -f1)\` |"
          } > release-notes.md

      # Single release step: creates the tag, publishes with formatted notes,
      # and attaches all build artifacts in one action.
      - name: Create release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          prerelease: true
          body_path: release-notes.md
          files: |
            persona-3-dual.nds
            sdcard.img.gz
            data.zip
