name: Build ROM
# Basically the minecraft snapshot naming sceme lol

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow creating releases and pushing tags
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -- Checkout ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read all existing tags

      # -- Generate version tag -------------------------------------------------
      # Format: YYwWWn  (e.g. 25w18a)
      #   YY  = 2-digit year
      #   WW  = 2-digit ISO week number
      #   n   = a, b, c … - increments each build within the same week
      - name: Generate version tag
        id: version
        run: |
          # Build the base prefix for this week, e.g. "25w18"
          YEAR=$(date -u +%y)
          WEEK=$(date -u +%V)
          PREFIX="${YEAR}w${WEEK}"

          # Fetch all tags matching this week's prefix, sort them, grab the last one
          EXISTING=$(git tag --list "${PREFIX}*" | sort | tail -n1)

          if [ -z "$EXISTING" ]; then
            # No builds this week yet - start at 'a'
            SUFFIX="a"
          else
            # Strip the prefix to get the current suffix letter, then advance it
            LAST_SUFFIX="${EXISTING#${PREFIX}}"
            # Increment: a→b, b→c, … z→aa (handles overflow gracefully)
            SUFFIX=$(python3 -c "
          s = '${LAST_SUFFIX}'
          chars = list(s)
          i = len(chars) - 1
          while i >= 0:
              if chars[i] != 'z':
                  chars[i] = chr(ord(chars[i]) + 1)
                  break
              else:
                  chars[i] = 'a'
                  i -= 1
          else:
              chars.insert(0, 'a')
          print(''.join(chars))
          ")
          fi

          TAG="${PREFIX}${SUFFIX}"
          RELEASE_NAME="Autobuild: ${TAG}"

          echo "tag=${TAG}"                       >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}"     >> $GITHUB_OUTPUT
          echo "Version tag : ${TAG}"
          echo "Release name: ${RELEASE_NAME}"

      # -- devkitARM -----------------------------------------------------------
      - name: Install devkitARM
        run: |
          wget -q https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -Sy --noconfirm nds-dev

      - name: Export devkitARM environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro"           >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "PATH=/opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:$PATH" >> $GITHUB_ENV

      # -- System tools --------------------------------------------------------
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      # -- Python venv ---------------------------------------------------------
      - name: Set up Python venv at ~/.venv
        run: |
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install --upgrade pip
          if [ -f tools/requirements.txt ]; then
            ~/.venv/bin/pip install -r tools/requirements.txt
          fi

      # -- Asset pipeline ------------------------------------------------------
      - name: Build assets (dialogue, music, video, environments, models, maps)
        run: make assets

      # -- ROM compile ---------------------------------------------------------
      - name: Compile ROM
        run: make

      # -- Tag & Release --------------------------------------------------------
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          prerelease: false
          files: Persona-3-Dual.nds
          body: |
            Automated build from commit ${{ github.sha }}
            Branch: `${{ github.ref_name }}`
